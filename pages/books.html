<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books — Pratham Tandale</title>
  <meta name="description" content="Books I've read — a visual bookshelf of covers, from Murakami to Taleb.">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
</head>
<body>
  <div class="container container-wide">

    <!-- Navigation -->
    <nav class="nav" id="main-nav">
      <a href="../index.html">home</a>
      <span class="nav-separator">·</span>
      <a href="blog.html">blog</a>
      <span class="nav-separator">·</span>
      <a href="kavita.html">कविता</a>
      <span class="nav-separator">·</span>
      <a href="books.html" class="active">books</a>
      <span class="nav-separator">·</span>
      <a href="dance.html">dance</a>
      <span class="nav-separator">·</span>
      <a href="https://github.com/prathampt" target="_blank" rel="noopener">github</a>
    </nav>

    <!-- Page Header -->
    <div class="page-header" id="books-header">
      <h1>📚 Books I've Read</h1>
      <p>A visual bookshelf — click any cover to take a closer look.</p>
    </div>

    <!-- Book Covers Grid -->
    <div class="books-grid" id="books-grid">
      <!-- Populated dynamically by script.js -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="books-empty" style="display: none;">
      <span class="emoji">📚</span>
      <p>Bookshelf loading...</p>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="book-lightbox">
      <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
      <div class="lightbox-content" id="lightbox-content">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="">
        <p class="lightbox-title" id="lightbox-title"></p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer" id="footer">
      <p>
        made with <span class="footer-heart">♥</span> by pratham
        <br>
        <a href="../index.html">back to home</a>
      </p>
    </footer>

  </div>

  <script src="../script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadBooks('../data/books.json', 'books-grid', 'books-empty');
    });
  </script>
</body>
</html>
